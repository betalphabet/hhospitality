<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H Hospitality Business Map</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Logo -->
    <div class="logo-container">
        <a href="../index.html" class="logo-link">
            <img src="../images/hhospitality_logo.png" alt="H Hospitality Group" class="logo">
        </a>
    </div>

    <!-- Background Blur Layer -->
    <div class="background-blur"></div>

    <div class="map-container">
        <div class="map-wrapper">
            <img src="images/map.webp" alt="Map" class="map-image" draggable="false">
            <div class="markers-container"></div>
        </div>
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <p class="loading-text">Loading map...</p>
            </div>
        </div>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip">
        <div class="tooltip-header">
            <h3 class="tooltip-title"></h3>
            <button class="tooltip-close">&times;</button>
        </div>
        <div class="tooltip-content">
            <div class="tooltip-info">
                <p class="tooltip-address"></p>
                <div class="tooltip-socials"></div>
                <div class="tooltip-buttons"></div>
            </div>
        </div>
    </div>
    <!-- Bottom Hint -->
    <div class="bottom-tooltip" id="bottomTooltip">
        🖱️ Drag the map to explore all investment projects
    </div>

    <!-- Right-side Photo Panel -->
    <div class="photo-panel" id="photoPanel">
        <div class="photo-panel-header">
            <h3 class="photo-panel-title" id="photoPanelTitle">Location Photos</h3>
            <button class="photo-panel-close" id="photoPanelClose">&times;</button>
        </div>
        <div class="photo-panel-content">
            <div class="photo-gallery" id="photoGallery">
                <!-- Photos are dynamically injected here -->
            </div>
        </div>
    </div>

    <!-- Photo Overlay -->
    <div class="photo-overlay" id="photoOverlay"></div>

    <!-- Fullscreen Photo Modal -->
    <div class="fullscreen-modal" id="fullscreenModal">
        <div class="fullscreen-modal-content">
            <button class="fullscreen-close" id="fullscreenClose">&times;</button>
            <img id="fullscreenImage" class="fullscreen-image" alt="Fullscreen photo">
        </div>
    </div>

    <script src="en_script.js"></script>
</body>

</html>
